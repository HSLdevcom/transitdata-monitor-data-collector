name: Test, Lint and create Docker image

on: [push, pull_request]

jobs:
  # --------------------
  # Python
  # --------------------
  build-python:
    uses: HSLdevcom/transitdata-shared-workflows/.github/workflows/ci-cd-python.yml@1.0.0
    secrets:
      DOCKER_USERNAME: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
      DOCKER_PASSWORD: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
    with:
      runTests: false

  build-python-aks-dev-docker-image:
    runs-on: ubuntu-latest
    # Run only on aks-dev branch
    if: github.ref == 'refs/heads/aks-dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff lint
        run: ruff check . --output-format=github

      - name: Run Ruff format check
        run: ruff format . --check

      - name: Build and publish aks-dev Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/transitdata-monitor-data-collector
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tags: aks-dev
  # --------------------
  # Java
  # --------------------
  build-java:
    uses: HSLdevcom/transitdata-shared-workflows/.github/workflows/ci-cd-java.yml@1.0.0
    secrets:
      DOCKER_USERNAME: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
      DOCKER_PASSWORD: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
    with:
      uploadJarArtifact: true
      jarArtifactName: "transitdata-metrics-exporter.jar"
      jarArtifactPath: "transitdata-metrics-exporter/target/transitdata-metrics-exporter.jar"
      workingDirectory: "transitdata-metrics-exporter"
      javaVersion: '25'

  build-java-release-docker-image:
    needs: build-java
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: transitdata-metrics-exporter.jar
          path: transitdata-metrics-exporter/target
      - name: Build and publish Java release Docker image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: hsldevcom/transitdata-metrics-exporter
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tag_semver: true

  build-java-aks-dev-docker-image:
    needs: build-java
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/aks-dev'
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: transitdata-metrics-exporter.jar
          path: transitdata-metrics-exporter/target
      - name: Build and publish Java aks-dev Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/transitdata-metrics-exporter
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tags: aks-dev
